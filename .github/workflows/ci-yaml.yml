# Lint YAML across the four complementary surfaces this repo defines.
#
# Four jobs run in parallel because the surfaces are independent and
# the tools complement rather than overlap:
#   - actionlint catches semantic workflow problems (expression typos,
#     missing run/uses, shell-script issues inside `run:` blocks).
#   - action-validator catches schema-level shape problems on BOTH
#     workflows AND composite action.yml files.
#   - yamllint catches plain-YAML style/syntax issues (trailing space,
#     duplicate keys, indentation) on everything outside the
#     actionlint / action-validator surface (Ansible, dependabot,
#     mkdocs, ...).
#   - ansible-lint catches Ansible-specific issues (playbooks, roles,
#     ansible.cfg). Auto-skips with a `::notice::` when the consumer
#     repo has none of `ansible.cfg`, `playbooks/`, `roles/` - so
#     non-Ansible consumers pay no configuration cost.
#
# All four composite actions self-resolve their pinned versions from
# .github/lib/versions.env, so no inputs are needed. Each action also
# auto-skips silently when its target surface is absent, which is what
# lets a single reusable workflow serve every consumer regardless of
# which YAML surfaces they actually use.
#
# Reusable: other repos call this workflow with no inputs.
#
#   jobs:
#     yaml:
#       uses: VitaliiAndreev/GitHub-Common/.github/workflows/ci-yaml.yml@master
#
# Expectation: the very first CI run of this workflow on this repo
# must pass. If it does not, the bar is set incorrectly - any
# findings get fixed at the composite-action layer, not by relaxing
# this workflow.

name: ci-yaml

on:
  pull_request:
  workflow_call:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/actionlint

  action-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/action-validator

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/yamllint

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/ansible-lint
