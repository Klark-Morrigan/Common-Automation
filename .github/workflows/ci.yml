# Lint and test the shell content of every composite action.
# Keeps the action surface honest: anything we ship as a reusable action
# must pass shellcheck and its own bats suite before merge.

name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on all .sh files
        run: |
          # -x lets shellcheck follow `source` directives across files.
          # SC1091 is suppressed because sourced paths are evaluated at
          # runtime against ${github.action_path}, not at lint time.
          shellcheck --shell=bash --severity=warning -x -e SC1091 \
            $(find actions -name '*.sh')

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bats-core/bats-action@3.0.1
        with:
          bats-version: 1.11.0
      - name: Run bats suites
        # Walks every action dir; missing .bats files are fine (e.g.
        # build-ssh-test-image has no script). bats exits 0 when it
        # finds zero test files in the given directory.
        run: bats --recursive actions/
