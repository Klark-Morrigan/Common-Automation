# Lint and test bash.
#
# Production bash (.github/), runner bash (scripts/), and domain bash
# (the repo's own production bash outside those, e.g. ops/) get separate
# lint jobs so failures are attributable at a glance and the categories
# can diverge later if their bars need to differ. All run at shellcheck's
# strictest setting via the shellcheck-bash composite action.
#
# The jobs run sequentially - each `needs:` the one before it - rather
# than in parallel. Two reasons:
#   - Fail fast: gate the heavier checks behind the lighter ones so a
#     PR stops at the smallest problem instead of running every job to
#     completion.
#   - Less PR-check noise: one check entry advances at a time instead
#     of six lighting up at once.
#
# Ordered cheapest-first, lint before test:
#   1. check-sh-executable - a file-mode check, the cheapest gate and a
#      common Windows-authored failure, so it runs first.
#   2. shellcheck-hooks    - the few files under .githooks/.
#   3. shellcheck-runners  - scripts/.
#   4. shellcheck-production - all of .github/.
#   5. shellcheck-domain   - the whole repo by exclusion, the broadest
#      lint scan.
#   6. bats                - the test suite, the heaviest step, gated
#      last behind every lint.
#
# Reusable: other repos call this workflow with no inputs. It scans the
# caller's `.github/` and `scripts/` directories explicitly, the rest of
# the repo (domain) by exclusion, and the git hooks; missing or empty
# trees are skipped silently, so a repo with no domain bash is unaffected.
#
#   jobs:
#     bash:
#       uses: Klark-Morrigan/Common-Automation/.github/workflows/ci-bash.yml@master
#
# Every `uses:` for a Common-Automation composite is a local `./` path,
# never a fully-qualified `@master` ref. The reason: GitHub Actions
# eagerly resolves every registry-form `uses:` at job-prep time
# before step-level `if:` guards are evaluated, so a PR that
# introduces a brand new composite would fail prep before any step
# could run. Local refs are resolved at step-execution time after
# checkout has populated the workspace, so they side-step the
# eager-resolution failure mode entirely.
#
# To make `./` work for external consumers (whose workspace does not
# contain Common-Automation's composites), each job does a conditional
# sparse checkout of Common-Automation at master into `.common-automation/` and
# the external branch of each if-guarded pair points there. The self
# branch points at the consumer's own workspace, so PRs to this repo
# exercise the PR's own composite code end-to-end.

name: ci-bash

on:
  pull_request:
  workflow_call:
    inputs:
      bats-version:
        # Empty default delegates to the bats composite action, which
        # falls back to .github/lib/versions.env. Single source of truth -
        # set this input explicitly only to pin a different version
        # than the canonical one.
        description: >
          Override bats-core version. Empty (default) uses the
          canonical version from .github/lib/versions.env.
        required: false
        type: string
        default: ''

jobs:
  # Files authored on Windows land in git as mode 0644 by default. On
  # Linux runners that breaks `bats run` (EACCES -> exit 126) and any
  # other direct script execution. The bats job catches this too, but
  # its symptom ("every test fails with status mismatch") is opaque;
  # this job gives the same failure a one-line, copy-pasteable fix.
  # Cheapest gate and a common failure, so it runs first.
  check-sh-executable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/check-sh-executable

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/check-sh-executable

  # Git hooks under .githooks/ have no .sh extension (git requires
  # exact filenames like pre-commit), so the *.sh-globbing
  # shellcheck-bash action cannot reach them via scan-path. The
  # shellcheck-hooks composite wraps the discovery + lint.
  shellcheck-hooks:
    needs: check-sh-executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-hooks

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-hooks

  # Runner bash: maintainer-side dev scripts (test runners, helpers).
  # Same strict bar as production today; the split exists so the bars
  # can diverge later without re-architecting the workflow.
  shellcheck-runners:
    needs: shellcheck-hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: scripts

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-bash
        with:
          scan-path: scripts

  # Production bash: everything under .github held to the strict bar.
  # That spans the composite actions in .github/actions/ and the
  # shared helpers in .github/lib - some consumer-invoked
  # (get-bats-version.sh, called by the test-bats action) and some
  # local-only (fix-sh-executable.sh, used by the hook and the
  # fix-permissions runner). Scanning all of .github covers them
  # regardless. Strictest setting non-negotiable - a regression in an
  # action ships to every downstream repo.
  shellcheck-production:
    needs: shellcheck-runners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: .github

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-bash
        with:
          scan-path: .github

  # Domain bash: the repo's own production bash that lives outside
  # .github/ and scripts/ (e.g. Infrastructure-Vm-Ansible's ops/). Scans
  # the whole workspace and prunes the trees the other jobs already cover
  # (.github, scripts, .githooks), the test suites (Tests/tests), and
  # vendored or CI-injected trees (.venv, node_modules,
  # .common-automation, .git). Gating by exclusion - rather than naming
  # each domain directory - keeps a newly added production directory
  # covered automatically, in every consumer repo, with no per-repo
  # wiring to drift. Repos whose bash lives entirely under .github/scripts
  # get an empty walk and skip silently.
  shellcheck-domain:
    needs: shellcheck-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: .
          exclude-paths: >-
            .git .github scripts Tests tests .venv node_modules
            .common-automation .githooks

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-bash
        with:
          scan-path: .
          exclude-paths: >-
            .git .github scripts Tests tests .venv node_modules
            .common-automation .githooks

  # Tests run last: the heaviest step, gated behind every lint so a
  # lint failure short-circuits before the suite spins up.
  bats:
    needs: shellcheck-domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/test-bats
        with:
          # Pass through to the action; empty value (push/PR triggers,
          # or workflow_call without override) makes the action read
          # the canonical version from .github/lib/versions.env.
          bats-version: ${{ inputs.bats-version }}

      - if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/test-bats
        with:
          bats-version: ${{ inputs.bats-version }}
