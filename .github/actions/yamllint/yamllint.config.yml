# Bundled default yamllint config for the yamllint composite action.
# Applied when the consumer repo has no .yamllint / .yamllint.yml /
# .yamllint.yaml at its root. Single source of truth for the
# strict-by-default bar every consumer inherits.
#
# Wraps yamllint's built-in `default` preset and relaxes the one rule
# the org has decided to widen project-wide:
#
# - line-length: 100. The default 80 dates back to terminals; the org
#   reads YAML in IDEs at 100+ columns, and the 80-char rule cost a
#   real CI failure in Infrastructure-VM-Ansible feature 02 on a
#   single 81-char sudoers rule that read better unwrapped than as
#   a folded scalar. Bumping here so every consumer inherits the
#   widened limit without per-repo .yamllint overrides.

extends: default

rules:
  line-length:
    max: 100
